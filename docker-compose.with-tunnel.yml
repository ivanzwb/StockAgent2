version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - backend-network

  frpc:
    image: snowdreamtech/frpc:latest
    container_name: stockagent2-frpc
    restart: unless-stopped
    volumes:
      - ./frpc.ini:/etc/frp/frpc.ini
    network_mode: host
    depends_on:
      - backend

networks:
  backend-network:
    driver: bridge
